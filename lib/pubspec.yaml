  name: lab_instrument_identifier
  description: Aplicación Flutter para identificación de instrumentos de laboratorio en tiempo real usando TensorFlow Lite.
  publish_to: 'none'

  version: 1.0.0+1

  environment:
    sdk: '>=3.0.0 <4.0.0'

  dependencies:
    flutter:
      sdk: flutter

    # Routing y Navegación
    go_router: ^12.0.0

    # State Management con Riverpod
    riverpod: ^2.4.0
    flutter_riverpod: ^2.4.0
    riverpod_generator: ^2.3.0

    # Machine Learning - TensorFlow Lite
    tflite_flutter: ^0.12.1

    # Cámara
    camera: ^0.10.0
    image: ^4.1.7
    image_picker: ^1.0.0

    # Base de Datos
    sqflite: ^2.3.0
    path_provider: ^2.1.0

    # API HTTP
    dio: ^5.3.0

    # Serialización JSON
    json_serializable: ^6.7.0
    json_annotation: ^4.8.0

    # Internacionalización
    intl: ^0.18.0

    # Utilities
    uuid: ^4.0.0
    logger: ^2.0.0
    freezed_annotation: ^2.4.0

    # UI Enhancements
    flutter_animate: ^4.2.0
    lottie: ^2.4.0
    

    # Permiso de cámara y almacenamiento
    permission_handler: ^12.0.1

    # Compartir datos
    share_plus: ^7.0.0
    csv: ^5.1.0

  dev_dependencies:
    flutter_test:
      sdk: flutter

    # Linting
    flutter_lints: ^3.0.0
    
    # Build & Code Generation
    build_runner: ^2.4.0
    freezed: ^2.4.0
    json_serializable: ^6.7.0
    riverpod_generator: ^2.3.0

    # Testing
    mockito: ^5.4.0
    integration_test:
      sdk: flutter

  flutter:
    uses-material-design: true

    assets:
      - assets/models/
      - assets/data/
      - assets/images/
      - assets/animations/

    flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/data/
    - assets/images/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700


dependency_overrides:
  tflite_flutter: 0.12.1
